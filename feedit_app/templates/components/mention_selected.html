<div id="mention-results" class="hidden" 
     hx-swap-oob="true" 
     data-user-id="{{ user_id }}" 
     data-user-name="{{ user_name }}">
</div>

<script>
  // This script runs when a user is selected from the mention dropdown
  document.addEventListener('DOMContentLoaded', function() {
    const mentionResults = document.getElementById('mention-results');
    const userId = mentionResults.getAttribute('data-user-id');
    const userName = mentionResults.getAttribute('data-user-name');
    
    // Get the active textarea
    const activeTextarea = document.activeElement;
    if (activeTextarea && activeTextarea.tagName === 'TEXTAREA') {
      // Get the current text and cursor position
      const text = activeTextarea.value;
      const cursorPos = activeTextarea.selectionStart;
      
      // Find the position of the @ symbol before the cursor
      const beforeCursor = text.substring(0, cursorPos);
      const atIndex = beforeCursor.lastIndexOf('@');
      
      if (atIndex >= 0) {
        // Replace the @query with @username
        const newText = text.substring(0, atIndex) + '@' + userName + ' ' + text.substring(cursorPos);
        activeTextarea.value = newText;
        
        // Set cursor position after the inserted mention
        const newCursorPos = atIndex + userName.length + 2; // +2 for @ and space
        activeTextarea.setSelectionRange(newCursorPos, newCursorPos);
        
        // Add to the mention list
        const mentionListId = activeTextarea.id + '_mention_list';
        const mentionList = document.getElementById(mentionListId);
        if (mentionList) {
          // Check if this user is already mentioned
          const existingMention = mentionList.querySelector(`[data-user-id="${userId}"]`);
          if (!existingMention) {
            const mentionTag = document.createElement('span');
            mentionTag.className = 'mention-tag';
            mentionTag.setAttribute('data-user-id', userId);
            mentionTag.textContent = '@' + userName;
            mentionList.appendChild(mentionTag);
          }
        }
        
        // Update the hidden input with mention data
        const hiddenInput = document.getElementById(activeTextarea.id + '_mentions');
        if (hiddenInput) {
          let mentions = [];
          try {
            mentions = JSON.parse(hiddenInput.value || '[]');
          } catch (e) {
            mentions = [];
          }
          
          // Add the mention if not already present
          if (!mentions.some(m => m.id === userId)) {
            mentions.push({
              id: userId,
              name: userName
            });
            hiddenInput.value = JSON.stringify(mentions);
          }
        }
      }
      
      // Focus back on the textarea
      activeTextarea.focus();
    }
  });
</script>
