{% load cotton %}

<!-- Ultra-simple mention input component -->
<div class="mention-input-container relative w-full">
  <!-- The actual textarea -->
  <textarea name="{{ name }}" id="{{ id|default:name }}" class="textarea textarea-bordered w-full {{ css_class }}"
    placeholder="{{ placeholder|default:'Write your message...' }}"
    data-mention-search-url="{% url 'api_search_users' %}?id={{ id|default:name }}" {% if required %}required{% endif
    %}>{{ value|default:'' }}</textarea>

  <!-- Mention results dropdown - will be populated by HTMX -->
  <div id="mention-results-{{ id|default:name }}" class="mention-results"></div>

  <!-- Hidden input to store mention data -->
  <input type="hidden" name="{{ name }}_mentions" id="{{ id|default:name }}_mentions" value="">

  <!-- Mention tracking -->
  <div class="text-xs text-gray-500 mt-1">
    <span>Use @ to mention users</span>
    <div id="{{ id|default:name }}_mention_list" class="mention-list mt-1 flex flex-wrap gap-1"></div>
  </div>
</div>

<script nonce="{{ request.csp_nonce }}">
  // Global object to track mention dropdowns and their state
  window.MentionManager = window.MentionManager || {
    activeDropdowns: new Set(),
    searchTimeouts: new Map(), // For throttling search requests

    // Initialize mention functionality for a textarea
    initMentionInput: function (textareaId) {
      const textarea = document.getElementById(textareaId);
      if (!textarea) return;

      // Add event listeners for this textarea
      this.addEventListeners(textarea);
    },

    // Add all necessary event listeners
    addEventListeners: function (textarea) {
      const textareaId = textarea.id;

      // Keydown event for Escape key
      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          this.hideDropdown(textareaId);
          e.preventDefault();
        }
      });

      // Keyup event for real-time mention filtering
      textarea.addEventListener('keyup', (e) => {
        this.handleMentionTyping(textarea, e);
      });

      // Input event for additional real-time filtering (handles paste, etc.)
      textarea.addEventListener('input', (e) => {
        this.handleMentionTyping(textarea, e);
      });

      // Click event to track cursor position
      textarea.addEventListener('click', (e) => {
        // Small delay to ensure cursor position is updated
        setTimeout(() => {
          this.handleMentionTyping(textarea, e);
        }, 10);
      });

      // Focus event to potentially hide dropdown if cursor is not in mention context
      textarea.addEventListener('focus', (e) => {
        setTimeout(() => {
          this.handleMentionTyping(textarea, e);
        }, 10);
      });
    },

    // Handle mention typing and trigger search
    handleMentionTyping: function (textarea, event) {
      const textareaId = textarea.id;
      const mentionContext = this.getMentionContext(textarea);

      console.log(`[MentionManager] handleMentionTyping for ${textareaId}:`, {
        isInMentionContext: mentionContext.isInMentionContext,
        mentionText: mentionContext.mentionText,
        cursorPos: textarea.selectionStart,
        textValue: textarea.value
      });

      if (mentionContext.isInMentionContext) {
        // We're in a mention context, trigger search
        console.log(`[MentionManager] Triggering search for: "${mentionContext.mentionText}"`);
        this.triggerMentionSearch(textarea, mentionContext.mentionText);
      } else {
        // Not in mention context, hide dropdown
        console.log(`[MentionManager] Not in mention context, hiding dropdown`);
        this.hideDropdown(textareaId);
      }
    },

    // Get the current mention context
    getMentionContext: function (textarea) {
      const text = textarea.value;
      const cursorPos = textarea.selectionStart;

      // Get text before cursor
      const beforeCursor = text.substring(0, cursorPos);
      const atIndex = beforeCursor.lastIndexOf('@');

      // Check if we're in a mention context
      if (atIndex === -1) {
        return { isInMentionContext: false, mentionText: '' };
      }

      // Check if @ symbol is at the start of a word
      if (atIndex > 0 && !/\s/.test(beforeCursor[atIndex - 1])) {
        return { isInMentionContext: false, mentionText: '' };
      }

      // Check if cursor is after the @ symbol
      if (cursorPos <= atIndex) {
        return { isInMentionContext: false, mentionText: '' };
      }

      // Get the mention text (text between @ and cursor)
      const mentionText = beforeCursor.substring(atIndex + 1);

      // Check if there's whitespace in the mention text
      if (/\s/.test(mentionText)) {
        return { isInMentionContext: false, mentionText: '' };
      }

      return { isInMentionContext: true, mentionText: mentionText };
    },

    // Trigger HTMX mention search with throttling
    triggerMentionSearch: function (textarea, mentionText) {
      const textareaId = textarea.id;

      console.log(`[MentionManager] triggerMentionSearch called for ${textareaId} with text: "${mentionText}"`);

      // Clear any existing timeout for this textarea
      if (this.searchTimeouts.has(textareaId)) {
        clearTimeout(this.searchTimeouts.get(textareaId));
      }

      const timeoutId = setTimeout(() => {
        console.log(`[MentionManager] Executing search after throttle delay`);

        const baseUrl = textarea.getAttribute('data-mention-search-url');
        if (!baseUrl) {
          console.error('[MentionManager] No mention search URL found on textarea');
          return;
        }

        const separator = baseUrl.includes('?') ? '&' : '?';
        const searchUrl = `${baseUrl}${separator}q=${encodeURIComponent(mentionText)}`;
        const resultsEl = document.getElementById(`mention-results-${textareaId}`);

        fetch(searchUrl, {
          headers: {
            "X-Requested-With": "XMLHttpRequest",
          },
        })
          .then((response) => {
            if (!response.ok) {
              throw new Error(`HTTP error ${response.status}`);
            }
            return response.text();
          })
          .then((html) => {
            resultsEl.innerHTML = html;
            this.showDropdown(textareaId);
          })
          .catch((error) => {
            console.error(`[MentionManager] Fetch request failed:`, error);
          });

        this.searchTimeouts.delete(textareaId);
      }, 200);

      this.searchTimeouts.set(textareaId, timeoutId);
    },

    // Hide dropdown for a specific textarea
    hideDropdown: function (textareaId) {
      const dropdown = document.getElementById(`mention-results-${textareaId}`);
      if (dropdown) {
        dropdown.innerHTML = '';
        this.activeDropdowns.delete(textareaId);
      }
    },

    // Show dropdown for a specific textarea
    showDropdown: function (textareaId) {
      this.activeDropdowns.add(textareaId);
    },

    // Hide all active dropdowns
    hideAllDropdowns: function () {
      this.activeDropdowns.forEach(textareaId => {
        this.hideDropdown(textareaId);
      });
    }
  };

  // Global delegation for dynamic .mention-item clicks
  document.getElementById("mention-results-{{ id|default:name }}")
    ?.addEventListener("click", function (e) {
      const item = e.target.closest(".mention-item[data-mention-user-id]");
      if (!item) return;

      const textareaId = item.getAttribute("data-mention-textarea");
      const userId = item.getAttribute("data-mention-user-id");
      const userName = item.getAttribute("data-mention-user-name");

      if (window.selectMention && typeof window.selectMention === "function") {
        window.selectMention(textareaId, userId, userName);
      } else {
        console.warn("selectMention() is not defined.");
      }
    });

  // Global click handler to hide dropdowns when clicking outside
  document.addEventListener('click', function (e) {
    // Check if click is outside any mention dropdown
    const isClickInsideDropdown = e.target.closest('.mention-results') ||
      e.target.closest('.mention-dropdown') ||
      e.target.classList.contains('mention-item');

    // Check if click is on a textarea with mention functionality
    const isClickOnMentionTextarea = e.target.closest('.mention-input-container');

    // If click is outside dropdown and not on a mention textarea, hide all dropdowns
    if (!isClickInsideDropdown && !isClickOnMentionTextarea) {
      window.MentionManager.hideAllDropdowns();
    }
  });

  // Initialize mention functionality for the current textarea
  document.addEventListener('DOMContentLoaded', function () {
    const textareaId = '{{ id|default:name }}';
    console.log(`[MentionManager] Initializing mention input for: ${textareaId}`);

    // Check if textarea exists
    const textarea = document.getElementById(textareaId);
    if (!textarea) {
      console.error(`[MentionManager] Textarea with ID ${textareaId} not found during initialization`);
      return;
    }

    console.log(`[MentionManager] Found textarea:`, textarea);
    console.log(`[MentionManager] Search URL:`, textarea.getAttribute('data-mention-search-url'));

    window.MentionManager.initMentionInput(textareaId);
    console.log(`[MentionManager] Initialization complete for ${textareaId}`);
  });

  // This function will be called when a user is selected from the dropdown
  function selectMention(textareaId, userId, userName) {
    console.log(`Selecting mention: ${userName} (${userId}) for textarea ${textareaId}`);
    const textarea = document.getElementById(textareaId);
    if (!textarea) {
      console.error(`Textarea with ID ${textareaId} not found`);
      return;
    }

    // Get the current text and cursor position
    const text = textarea.value;
    const cursorPos = textarea.selectionStart;

    // Find the position of the @ symbol before the cursor
    const beforeCursor = text.substring(0, cursorPos);
    const atIndex = beforeCursor.lastIndexOf('@');

    if (atIndex >= 0) {
      // Replace the @query with a standardized mention format
      const mentionFormat = `@${userName}[${userId}]`;
      const newText = text.substring(0, atIndex) + mentionFormat + ' ' + text.substring(cursorPos);
      textarea.value = newText;

      // Set cursor position after the inserted mention
      const newCursorPos = atIndex + mentionFormat.length + 1;
      textarea.setSelectionRange(newCursorPos, newCursorPos);

      // Hide the dropdown
      window.MentionManager.hideDropdown(textareaId);

      // Focus back on the textarea
      textarea.focus();

      // Add to the visual mention list
      const mentionList = document.getElementById(`${textareaId}_mention_list`);
      if (mentionList) {
        const mentionTag = document.createElement('span');
        mentionTag.className = 'mention-tag bg-primary/10 text-primary px-2 py-0.5 rounded text-xs';
        mentionTag.setAttribute('data-user-id', userId);
        mentionTag.textContent = '@' + userName;
        mentionList.appendChild(mentionTag);
      }
    }
  }
</script>
