{% load widget_tweaks %}
<form method="post" hx-post="{% url 'account_reset_password' %}" hx-target="#auth-dynamic" hx-swap="innerHTML"
    class="space-y-4">
    {% csrf_token %}
    <h3 class="text-lg font-semibold">Reset your password</h3>

    {% for field in form.visible_fields %}
    <div>
        <label class="label">{{ field.label }}</label>
        {% render_field field class="input input-bordered w-full" %}
        {% for error in field.errors %}
        <p class="text-sm text-error">{{ error }}</p>
        {% endfor %}
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary w-full">Send Reset Email</button>
</form>
