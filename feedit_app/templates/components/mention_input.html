{% load cotton_tags %}

<div class="mention-input-container relative">
  <!-- The actual textarea -->
  <textarea 
    name="{{ name }}" 
    id="{{ id|default:name }}" 
    class="textarea textarea-bordered w-full {{ css_class }}"
    placeholder="{{ placeholder|default:'Write your message...' }}"
    hx-get="{% url 'api_search_users' %}"
    hx-trigger="keyup changed delay:300ms"
    hx-target="#mention-results-{{ id|default:name }}"
    hx-include="this"
    hx-swap="innerHTML"
    {% if required %}required{% endif %}
  >{{ value|default:'' }}</textarea>
  
  <!-- Mention results dropdown -->
  <div id="mention-results-{{ id|default:name }}" class="mention-results absolute z-10 w-full mt-1 hidden"></div>
  
  <!-- Hidden input to store mention data -->
  <input type="hidden" name="{{ name }}_mentions" id="{{ id|default:name }}_mentions" value="">
  
  <!-- Mention tracking -->
  <div class="text-xs text-gray-500 mt-1">
    <span>Use @ to mention users</span>
    <div id="{{ id|default:name }}_mention_list" class="mention-list mt-1"></div>
  </div>
</div>

<style>
  .mention-results:not(:empty) {
    display: block;
    background-color: white;
    border-radius: 0.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    max-height: 300px;
    overflow-y: auto;
  }
  
  .mention-item {
    cursor: pointer;
    transition: background-color 0.2s;
  }
  
  .mention-item:hover {
    background-color: rgba(0, 0, 0, 0.05);
  }
  
  .mention-tag {
    display: inline-block;
    background-color: rgba(var(--p), 0.1);
    color: hsl(var(--p));
    border-radius: 0.25rem;
    padding: 0.125rem 0.375rem;
    margin-right: 0.25rem;
    margin-bottom: 0.25rem;
    font-size: 0.75rem;
  }
</style>
