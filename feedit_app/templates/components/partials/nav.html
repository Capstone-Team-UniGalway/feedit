{% if user.is_authenticated %}
<li>
    <a href="{% url 'dashboard' %}"
        class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="fas fa-home"></i> Dashboard
    </a>
</li>
<li>
    <a href="{% url 'companies:list' %}"
        class="nav-link {% if request.resolver_match.url_name == 'list' and request.resolver_match.namespace == 'companies' %}active{% endif %}">
        <i class="fas fa-building"></i> Companies
    </a>
</li>
{% if user.company or user.workplace %}
<li>
    <a href="{% url 'thread_list' %}"
        class="nav-link {% if request.resolver_match.url_name == 'thread_list' or request.resolver_match.url_name == 'thread_detail' %}active{% endif %}">
        <i class="fas fa-comment-dots"></i> Threads
    </a>
</li>
<li>
    <a href="{% url 'companies:directory' %}"
        class="nav-link {% if request.resolver_match.url_name == 'directory' and request.resolver_match.namespace == 'companies' %}active{% endif %}">
        <i class="fas fa-users"></i> Employee Directory
    </a>
</li>
{% endif %}
{% if user.company %}
<li>
    <a href="#" class="nav-link">
        <i class="fas fa-star"></i> Reviews
    </a>
</li>
{% endif %}
{% else %}
<li><a href="{% url 'companies:list' %}"
        class="nav-link {% if request.resolver_match.url_name == 'list' and request.resolver_match.namespace == 'companies' %}active{% endif %}">
        <i class="fas fa-building"></i> Companies
    </a></li>
{% endif %}
