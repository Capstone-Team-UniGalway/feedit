        integrity="sha384-Tivrr09pcdu9hRUnkGJL0HMmIK+Sq2drDF+mgk2cbyCfXcr7Klq6tQEd9IMc2ELu"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/daisyui@5.0.9/theme/dark/index.js"
        integrity="sha384-1dYqgR4S65WKonYBtdwgV39f9ZXey9DZEMVhyWFMWv89pvwNOrCxDsNsl6DsX0jp"
        crossorigin="anonymous"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.8/dist/index.global.js"
        integrity="sha384-8X5W4SD/nWpjc4BXk/HRuQ+rhoTF2Dx9DJ+7I2oQctvF4jSQjwtYIeo6fGqZSGGR"
        crossorigin="anonymous"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous" />

        integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
        crossorigin="anonymous"></script>

    {{ slot }}

    <style nonce="{{ request.csp_nonce }}">
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: background-color 0.3s;
        }

        .nav-link:hover {
            background-color: var(--color-base-200);
        }

        .nav-link.active {
            background-color: var(--color-primary);
            color: var(--color-primary-content);
        }

        .dropdown-menu {
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .dropdown:hover .dropdown-menu {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
