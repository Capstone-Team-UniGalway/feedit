<c-layouts.base>
    <section class="container max-w-xl mx-auto px-4 py-10">
        <div class="card bg-base-100 shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Generate New Recovery Codes</h2>
            <p class="text-sm text-warning mb-6">Generating new codes will invalidate the current ones.</p>
            <form method="post">
                {% csrf_token %}
                <button class="btn btn-warning w-full">Generate New Codes</button>
            </form>
        </div>
    </section>
</c-layouts.base>
