{% load secure_files_tags %}
<c-layouts.base>

    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">Secure File Upload Demo</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Upload Section -->
            <div class="card bg-base-100 shadow-xl">
                <div class="card-body">
                    <h2 class="card-title">Upload File</h2>

                    {% get_content_type_id user as content_type_id %}
                    <c-secure-files.upload :content_type_id="{{ content_type_id }}" :object_id="{{ user.id }}"
                        label="Upload Profile Picture" help_text="Upload an image for your profile (JPG, PNG, WEBP)"
                        accept="image/*" />
                </div>
            </div>

            <!-- Files Section -->
            <div class="card bg-base-100 shadow-xl">
                <div class="card-body">
                    <h2 class="card-title">Your Files</h2>

                    {% get_object_files user as files %}
                    <c-secure-files.list :files="{{ files }}" :show_delete="true" />
                </div>
            </div>
        </div>
    </div>
</c-layouts.base>
