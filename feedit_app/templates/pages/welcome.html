{% comment %} Assuming this file is templates/pages/welcome.html {% endcomment %}
<c-layouts.base>
    <div class="flex flex-grow flex-col items-center justify-center px-4 py-16">
        <h1 class="mb-12 text-3xl font-semibold">Select Your Role</h1>
        <div class="mb-8 flex flex-col gap-6 md:flex-row">
            <!-- Employee Button -->
            <a href="{% url 'account_auth' %}?role=employee"
                class="card bg-primary text-primary-content w-64 shadow-xl transition hover:scale-105">
                <div class="card-body items-center text-center">
                    <svg class="mb-2 h-12 w-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <h2 class="card-title">Employee</h2>
                </div>
            </a>

            <!-- Employer Button -->
            <a href="{% url 'account_auth' %}?role=employer"
                class="card bg-base-200 text-base-content w-64 shadow-xl transition hover:scale-105">
                <div class="card-body items-center text-center">
                    <svg class="mb-2 h-12 w-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M4 4h16v16H4z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <h2 class="card-title">Employer</h2>
                </div>
            </a>
        </div>
    </div>
</c-layouts.base>
