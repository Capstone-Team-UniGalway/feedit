<c-layouts.base>
    <!-- Create Company Section -->
    <div class="max-w-2xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2">Create a Company</h1>
            <p class="text-gray-500">Set up your company profile on FeedIT</p>
        </div>

        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <form method="post" action="{% url 'companies:create' %}" class="space-y-4">
                    {% csrf_token %}

                    <!-- Company Name -->
                    <div>
                        <label class="label">
                            <span class="label-text">Company Name*</span>
                        </label>
                        <input type="text" name="name" placeholder="Enter company name"
                            class="input input-bordered w-full" value="{{ request.GET.name }}" required />
                    </div>

                    <!-- Industry -->
                    <div>
                        <label class="label">
                            <span class="label-text">Industry</span>
                        </label>
                        <input type="text" name="industry" placeholder="e.g. Technology, Healthcare, Education"
                            class="input input-bordered w-full" />
                    </div>

                    <!-- Location -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="label">
                                <span class="label-text">City</span>
                            </label>
                            <input type="text" name="city" placeholder="City" class="input input-bordered w-full" />
                        </div>
                        <div>
                            <label class="label">
                                <span class="label-text">Country</span>
                            </label>
                            <input type="text" name="country" placeholder="Country"
                                class="input input-bordered w-full" />
                        </div>
                    </div>

                    <!-- Founded Date -->
                    <div>
                        <label class="label">
                            <span class="label-text">Date Founded</span>
                        </label>
                        <input type="date" name="date_founded" class="input input-bordered w-full" />
                    </div>

                    <!-- Bio -->
                    <div>
                        <label class="label">
                            <span class="label-text">Company Description</span>
                        </label>
                        <textarea name="bio" placeholder="Tell us about your company"
                            class="textarea textarea-bordered w-full" rows="4"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-4">
                        <button type="submit" class="btn btn-primary w-full">
                            <i class="fas fa-building mr-2"></i> Create Company
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-500 mb-2">Already have a company?</p>
            <a href="{% url 'join_company' %}" class="btn btn-outline btn-sm">
                <i class="fas fa-search mr-1"></i> Find a Company to Join
            </a>
        </div>
    </div>
</c-layouts.base>
