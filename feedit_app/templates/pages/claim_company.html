<c-layouts.base>
    <!-- Company Detail Section -->
    <div class="container mx-auto px-4 py-8">
        <div class="grid md:grid-cols-2 gap-8 items-center">
            <!-- Left Info -->
            <div>
                <h1 class="text-4xl font-bold">Apple</h1>
                <p class="text-gray-500 mb-6">Job title</p>
                <button class="btn btn-outline btn-primary">Claim Company (requires proof)</button>
            </div>

            <!-- Company Image -->
            <div>
                <img src="https://via.placeholder.com/500x300" alt="Company banner" class="rounded-xl shadow-lg" />
            </div>
        </div>
    </div>

    <!-- Reviews -->
    <div class="container mx-auto px-4 py-4 space-y-4">
        <!-- Review 1 -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body flex-row items-start">
                <div class="text-xl mr-4">1</div>
                <div>
                    <div class="flex items-center gap-2">
                        <img src="https://i.pravatar.cc/40?img=1" class="w-10 h-10 rounded-full" />
                        <div>
                            <h3 class="font-bold">Jinny Oslin</h3>
                            <p class="text-sm text-gray-500">A day ago</p>
                        </div>
                        <div class="ml-auto flex gap-1 text-yellow-400">
                            ★★★★★
                        </div>
                    </div>
                    <p class="mt-2">Magna id sint irure in cillum esse nisi dolor laboris ullamco. Consectetur
                        proident...</p>
                </div>
            </div>
        </div>

        <!-- Review 2 -->
        <div class="card bg-base-100 shadow-md">
            <div class="card-body flex-row items-start">
                <div class="text-xl mr-4">2</div>
                <div>
                    <div class="flex items-center gap-2">
                        <img src="https://i.pravatar.cc/40?img=2" class="w-10 h-10 rounded-full" />
                        <div>
                            <h3 class="font-bold">Jinny Oslin</h3>
                            <p class="text-sm text-gray-500">A day ago</p>
                        </div>
                        <div class="ml-auto flex gap-1 text-yellow-400">
                            ★★★★★
                        </div>
                    </div>
                    <p class="mt-2">Magna id sint irure in cillum esse nisi dolor laboris ullamco. Consectetur
                        proident...</p>
                </div>
            </div>
        </div>
    </div>
</c-layouts.base>
