<c-layouts.base>
    <!-- Page Content -->
    <section class="container mx-auto px-4 max-w-3xl mb-16">
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-4xl font-bold">Apple Reviews</h1>
            <button class="btn btn-outline btn-sm">Sort by</button>
        </div>
        <p class="text-sm text-gray-500 mb-6">Job title</p>

        <!-- Specific Review -->
        <div class="card bg-white shadow-sm mb-6">
            <div class="card-body space-y-2">
                <div class="flex items-center gap-3">
                    <div class="text-lg font-bold">1</div>
                    <div>
                        <h3 class="font-semibold">Jinny Oslin</h3>
                        <p class="text-sm text-gray-400">📅 a day ago</p>
                    </div>
                    <div class="ml-auto text-yellow-400 text-sm">★★★★☆</div>
                </div>
                <p class="text-sm text-gray-600">Magna id sint irure in cillum esse nisi dolor laboris ullamco.
                    Consectetur proident...</p>
            </div>
        </div>

        <!-- Reply Box -->
        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-2">Reply</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Input text" class="input input-bordered w-full" />
                <button class="btn btn-primary w-full">Submit reply</button>
            </form>
        </div>
    </section>
</c-layouts.base>
