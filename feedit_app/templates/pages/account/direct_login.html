{% extends "components/layouts/base.html" %}

{% block content %}
<div class="flex flex-grow flex-col items-center justify-center px-4 py-16">
    <h1 class="mb-8 text-2xl font-medium">Direct Login</h1>
    <div class="w-full max-w-md bg-base-100 p-6 rounded shadow">
        {% if error %}
        <div class="alert alert-error mb-4">{{ error }}</div>
        {% endif %}
        
        <form method="post" class="mb-6">
            {% csrf_token %}
            
            <div class="form-control mb-4">
                <label class="label" for="id_email">
                    <span class="label-text">Email</span>
                </label>
                <input type="email" name="email" id="id_email" placeholder="Email address" class="input input-bordered w-full" required>
            </div>
            
            <div class="form-control mb-6">
                <label class="label" for="id_password">
                    <span class="label-text">Password</span>
                </label>
                <input type="password" name="password" id="id_password" placeholder="Password" class="input input-bordered w-full" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>
        
        <div class="text-center">
            <p class="text-sm text-gray-500">This is a direct login form for debugging purposes.</p>
            <p class="text-sm text-gray-500 mt-2">
                <a href="{% url 'account_auth' %}?role=employee" class="link link-primary">Back to regular login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
