<c-layouts.base>
    <div class="container max-w-md mx-auto px-4 py-12">
        <div class="card bg-base-100 shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Password Reset Email Sent</h2>

            <div class="alert alert-success text-sm mb-4">
                If an account with that email exists, a password reset link has been sent.
            </div>

            <p class="mb-4">Please check your email for a link to reset your password. If it doesn't appear within a few
                minutes, check your spam folder.</p>

            <div class="mt-6">
                <a href="{% url 'account_auth' %}" class="btn btn-outline w-full">Return to Login</a>
            </div>
        </div>
    </div>
</c-layouts.base>
