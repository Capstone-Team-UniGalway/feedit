<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeedIT Companies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            plugins: [window.daisyui],
        };
    </script>
</head>

<body class="p-6 bg-base-200">

    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow rounded-lg mb-6 px-6">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl"><img src="https://cdn-icons-png.flaticon.com/512/25/25694.png"
                    class="w-6 h-6 mr-2" />FeedIT</a>
        </div>
        <div class="flex gap-4">
            <a class="btn btn-ghost">Home</a>
            <a class="btn btn-ghost btn-active">Companies</a>
            <a class="btn btn-ghost">Contact</a>
        </div>
        <div class="ml-auto">
            <button class="btn btn-primary">Login</button>
        </div>
    </div>

    <!-- Filters and Search -->
    <div class="flex flex-wrap items-center justify-between mb-6 gap-4">
        <input type="text" placeholder="Search..." class="input input-bordered w-full max-w-xs" />
        <div class="flex gap-2">
            <button class="btn btn-outline">Filter</button>
            <button class="btn btn-outline">Sort by</button>
        </div>
    </div>

    <!-- Grid of Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- Example Card -->
        <div class="card bg-base-100 shadow-xl">
            <figure><img src="https://via.placeholder.com/300x150" alt="Company logo" /></figure>
            <div class="card-body">
                <h2 class="card-title">Apple Inc.</h2>
                <p>Technology company</p>
                <p class="text-sm text-gray-500">NASDAQ: AAPL</p>
                <div class="card-actions justify-end">
                    <button class="btn btn-outline btn-sm">View Profile</button>
                </div>
            </div>
        </div>

        <!-- Copy this block for more cards -->
    </div>

</body>

</html>
