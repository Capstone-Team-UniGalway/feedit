<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report a Bug – FeedIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            plugins: [window.daisyui],
        };
    </script>
</head>

<body class="bg-base-200 text-base-content">

    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow px-6 mb-8">
        <div class="flex-1">
            <a href="#" class="btn btn-ghost text-xl">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" class="w-6 h-6 mr-2" />
                FeedIT
            </a>
        </div>
        <div class="flex gap-4">
            <a href="#" class="btn btn-ghost">Home</a>
            <a href="#" class="btn btn-ghost">Companies</a>
            <a href="#" class="btn btn-ghost btn-active border-b-2 border-primary">Contact</a>
        </div>
        <div class="ml-auto">
            <button class="btn btn-outline btn-primary">🔐 Login</button>
        </div>
    </div>

    <!-- Contact Form -->
    <section class="container mx-auto px-4 max-w-xl">
        <h1 class="text-3xl font-bold mb-6 text-center">Report a Bug</h1>

        <form class="space-y-4">
            <!-- Name -->
            <div>
                <label class="label">
                    <span class="label-text">Name</span>
                </label>
                <input type="text" placeholder="Your Name" class="input input-bordered w-full" />
            </div>

            <!-- Email -->
            <div>
                <label class="label">
                    <span class="label-text">Email</span>
                </label>
                <input type="email" placeholder="youremail@example.com" class="input input-bordered w-full" />
            </div>

            <!-- Description -->
            <div>
                <label class="label">
                    <span class="label-text">Description of the bug</span>
                </label>
                <textarea class="textarea textarea-bordered w-full"
                    placeholder="Please include information about the device, OS version, browser or app version, etc."></textarea>
            </div>

            <!-- Steps -->
            <div>
                <label class="label">
                    <span class="label-text">Steps to reproduce the bug (one per line)</span>
                </label>
                <textarea class="textarea textarea-bordered w-full"
                    placeholder="Add the steps to reproduce the bug"></textarea>
            </div>

            <!-- Actions -->
            <div class="flex justify-start gap-4 pt-2">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-neutral">Cancel</button>
            </div>
        </form>
    </section>

</body>

</html>
